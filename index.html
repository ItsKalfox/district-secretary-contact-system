<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#faf9f5"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Office Contact Directory</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239c7f2f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cpath d='M15.05 13.52c-.68-.28-1.42.06-1.74.7l-.46.92c-1.34-.65-2.43-1.74-3.08-3.08l.92-.46c.64-.32.98-1.06.7-1.74L10.5 7.1c-.26-.64-.94-1.03-1.63-.94H7.63c-.8.04-1.46.68-1.48 1.48-.2 6.55 5.1 11.85 11.65 11.65.8-.02 1.44-.68 1.48-1.48v-1.24c.09-.69-.3-1.37-.94-1.63l-2.76-1.1z' fill='%239c7f2f'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style/style.css">
<script src="JavaScript/script.js" defer></script>
</head>
<body>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-gradient"></div>
  <div class="direct-lines-container">
    <button id="directLinesToggle" class="direct-btn" aria-label="Show direct lines">
      <img src="Images/background/telephone.png" class="phone-icon" width="13" height="13";/>
      <span class="btn-text">Direct Lines</span>
    </button>
    <div class="direct-popup" id="directPopup">
      <div class="direct-row">
        <span class="direct-row-label" id="lblDirectLine">Receptionist</span>
        <div class="direct-row-value">
          <span class="direct-number">041 222 2238</span>
          <a class="call-btn" id="lnkDirectLineCall" href="tel:+94412222238">
            <svg class="call-icon" viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
            <span class="call-text">Call</span>
          </a>
        </div>
      </div>
      <div class="direct-divider"></div>
      <div class="direct-row">
        <span class="direct-row-label" id="lblFax">Fax</span>
        <div class="direct-row-value">
          <span class="direct-number">041 223 3208</span>
        </div>
      </div>
    </div>
  </div>

  <button id="langToggle" class="lang-btn">සිංහල</button>
  <div class="hero-content">
    <h1 class="hero-title">Divisional <span>Secretariat </span>of <br>Matara Four Gravets</h1>
    <p class="hero-sub">Employee Contact Directory</p>
    <div class="hero-divider"></div>
  </div>
</div>

<div class="search-wrapper">
  <div class="dropdown" id="categoryDropdown">
    <button class="dropdown-btn" id="dropdownBtn" aria-label="Filter by category">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
    </button>
    <div class="dropdown-content" id="dropdownContent"></div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by name or position…" autocomplete="off" />
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </span>
  </div>
</div>

<div class="container" id="cards">
  <div class="empty" id="emptyState">No employees found.</div>
</div>

<footer class="footer">
  <div class="footer-content">
    <img src="https://cdn.jsdelivr.net/gh/ItsKalfox/ItsKalfox/tailcoded-logo-mini-black.png" alt="Tail Coded Studio" class="footer-logo" />
    <span class="footer-text">&copy; 2026 Tail Coded Studio. All rights reserved.</span>
  </div>
</footer>

</body>
</html>
